```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>طلب كتابة مذكرات</title>

    <meta name="author" content="Ahmed Sameh">
    <meta name="description" content="نحن نقدم خدمات إلكترونية">

    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

    <style>
        /* =========================
           Reset
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* =========================
           Body
        ========================= */
        body {
            min-height: 100vh;
            background: #121212;
            color: white;
            font-family: Tahoma, Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;
        }

        /* =========================
           Form Container
        ========================= */
        .form-container {
            width: 100%;
            max-width: 500px;

            background: #1b1b1b;
            border: 1px solid #333;
            border-radius: 15px;

            padding: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;

            font-size: clamp(1.5rem, 4vw, 2rem);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input,
        textarea {
            width: 100%;

            padding: 14px;

            border: 1px solid #444;
            border-radius: 8px;

            background: #222;
            color: white;

            font-size: 1rem;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: gold;
            box-shadow: 0 0 10px rgba(255, 215, 0, .4);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            padding: 14px;

            border: 2px solid #444;
            border-radius: 8px;

            background: #222;
            color: white;

            font-size: 1rem;
            cursor: pointer;

            transition: .3s;
        }

        button:hover {
            background: gold;
            color: black;
            border-color: gold;
            box-shadow: 0 0 15px gold;
        }

        /* =========================
           Mobile
        ========================= */
        @media (max-width: 480px) {
            .form-container {
                padding: 20px;
            }

            input,
            textarea,
            button {
                font-size: .95rem;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">

        <h2>طلب كتابة مذكرات</h2>

        <form action="https://formspree.io/f/mrbknrzy" method="POST">

            <input
                type="text"
                name="name"
                placeholder="الاسم الكامل"
                required>

            <input
                type="email"
                name="email"
                placeholder="البريد الإلكتروني"
                required>

            <input
                type="tel"
                name="phone"
                placeholder="رقم الهاتف"
                pattern="[0-9]{11}"
                maxlength="11"
                required>

            <textarea
                name="details"
                placeholder="اكتب تفاصيل المذكرة المطلوبة..."
                required></textarea>

            <button type="submit">
                إرسال الطلب
            </button>

        </form>

    </div>

</body>

</html>
```
