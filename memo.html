
<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة كتابة المذكرات</title>

    <meta name="author" content="Ahmed Sameh">
    <meta name="description" content="نحن نقدم خدمات الكترونية">

    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

    <style>
        /* =========================
           Reset
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* =========================
           Body
        ========================= */
        body {
            background: #121212;
            color: white;
            font-family: Tahoma, Arial, sans-serif;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;
        }

        /* =========================
           Header
        ========================= */
        header {
            width: 100%;
            max-width: 800px;

            text-align: center;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* =========================
           Title
        ========================= */
        h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            line-height: 1.3;
        }

        /* =========================
           Description
        ========================= */
        p {
            width: 100%;
            max-width: 650px;

            font-size: clamp(1rem, 2vw, 1.2rem);
            line-height: 1.8;

            color: #d1d1d1;
        }

        /* =========================
           Button
        ========================= */
        a.button {
            text-decoration: none;

            background: #222;
            color: white;

            border: 2px solid #444;
            border-radius: 10px;

            padding: 14px 32px;

            font-size: clamp(.9rem, 2vw, 1.1rem);

            transition: .3s ease;
        }

        a.button:hover {
            background: gold;
            color: black;
            border-color: gold;
            box-shadow: 0 0 15px gold;
        }

        /* =========================
           Mobile
        ========================= */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            a.button {
                width: 100%;
                max-width: 300px;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>خدمة كتابة المذكرات</h1>

        <p>
            نوفّر لك خدمة كتابة مذكرات دقيقة واحترافية باللغة العربية أو الإنجليزية،
            سواء كانت مذكّرات محاضرات، ملخّصات دراسية، أو توثيق اجتماعات عمل.

            <br><br>

            يُعتمد التنسيق اللائق وتدقيق لغوي كامل لضمان الجودة.
        </p>

        <a href="order-memo.html"
           class="button"
           title="املأ الاستمارة">
            اطلب الخدمة الآن
        </a>
    </header>

</body>

</html>
