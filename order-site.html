
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>طلب تصميم وبرمجة ويب سايت</title>

    <meta name="author" content="Ahmed Sameh">
    <meta name="description" content="نحن نقدم خدمات تصميم وبرمجة المواقع الإلكترونية">

    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

    <style>
        /* ===== Reset ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


/* ===== Body ===== */
body {

    min-height: 100vh;

    background: #121212;

    color: white;

    font-family: Tahoma, Arial, sans-serif;

    display: flex;

    justify-content: center;

    align-items: flex-start;

    padding: 30px 15px;

}


/* ===== Form Container ===== */
.form-container {

    width: 100%;

    max-width: 550px;

    background: #1b1b1b;

    border: 1px solid #333;

    border-radius: 15px;

    padding: 30px;

}


/* ===== Title ===== */
h2 {

    text-align: center;

    margin-bottom: 25px;

    font-size: clamp(22px, 5vw, 32px);

}


/* ===== Form ===== */
form {

    display: flex;

    flex-direction: column;

    gap: 15px;

}


/* ===== Inputs ===== */
input,
textarea {

    width: 100%;

    padding: 14px;

    background: #222;

    color: white;

    border: 1px solid #444;

    border-radius: 8px;

    font-size: 16px;

}


input::placeholder,
textarea::placeholder {

    color: #aaa;

}


input:focus,
textarea:focus {

    outline: none;

    border-color: gold;

    box-shadow: 0 0 10px rgba(255,215,0,.4);

}


/* ===== Textarea ===== */
textarea {

    min-height: 140px;

    resize: vertical;

}


/* ===== Button ===== */
button {

    width: 100%;

    padding: 14px;

    background: #222;

    color: white;

    border: 2px solid #444;

    border-radius: 8px;

    font-size: 17px;

    cursor: pointer;

    transition: .3s;

}


button:hover {

    background: gold;

    color: black;

    border-color: gold;

    box-shadow: 0 0 15px gold;

}


/* ===== Tablet ===== */
@media(max-width:768px){

    .form-container{

        padding:25px;

    }

}


/* ===== Mobile ===== */
@media(max-width:480px){

    body{

        padding:20px 12px;

    }


    .form-container{

        padding:20px;

        border-radius:12px;

    }


    input,
    textarea,
    button{

        font-size:15px;

        padding:12px;

    }

}
    </style>
</head>

<body>

    <div class="form-container">

        <h2>طلب تصميم وبرمجة ويب سايت</h2>

        <form action="https://formspree.io/f/mnnvelal" method="POST">

            <input
                type="text"
                name="name"
                placeholder="الاسم الكامل"
                required>

            <input
                type="email"
                name="email"
                placeholder="البريد الإلكتروني"
                required>

            <input
                type="tel"
                name="phone"
                placeholder="رقم الهاتف"
                pattern="[0-9]{11}"
                maxlength="11"
                required>

            <textarea
                name="details"
                placeholder="اكتب تفاصيل الموقع المطلوب (عدد الصفحات - الألوان - نوع الموقع - أي ملاحظات أخرى)"
                required></textarea>

            <button type="submit">
                إرسال الطلب
            </button>

        </form>

    </div>

</body>

</html>
