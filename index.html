
<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمات إلكترونية</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;

            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            flex: 1 1 300px;

            text-decoration: none;
            color: white;

            background: #222;
            border: 2px solid #444;
            border-radius: 10px;

            padding: 20px;

            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;

            transition: .3s;
        }

        .btn:hover {
            background: #d4af37;
            color: #000;
            border-color: #d4af37;
            transform: translateY(-4px);
            box-shadow: 0 0 20px rgba(212, 175, 55, .5);
        }

        @media (max-width: 600px) {
            .btn {
                flex-basis: 100%;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <a href="memo.html" class="btn" target="_blank">
            📝 كتابة المذكرات
            <br>
            (Word, Excel, PowerPoint)
        </a>

        <a href="site.html" class="btn" target="_blank">
            🌐 إنشاء مواقع إلكترونية
            <br>
            (HTML, CSS, JavaScript)
        </a>

    </div>

</body>

</html>
